- pipeline: buddy
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  actions:
  - action: ./gradlew clean build
    type: BUILD
    execute_commands:
    - chmod +x ./gradlew
    - ./gradlew clean build
    shell: BASH
    docker_image_name: library/gradle
    docker_image_tag: 9.3
  - action: gradle build
    type: BUILD
    execute_commands:
    - gradle build
    shell: BASH
    docker_image_name: gradle:8.4-jdk17:gradle
    docker_image_tag: 8.4-jdk17
